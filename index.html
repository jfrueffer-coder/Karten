<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartensammlung</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ══════════════════════════════════════════════════════════════
//  FIREBASE CONFIG (Hier deine Daten eintragen)
// ══════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDUy7K4LvGedpWv1ctM0QmTPdZ3Q_8fW44",
  authDomain: "karten-96920.firebaseapp.com",
  projectId: "karten-96920",
  storageBucket: "karten-96920.firebasestorage.app",
  messagingSenderId: "895981550262",
  appId: "1:895981550262:web:d69cc1e84ab956ca780417"
};
// ══════════════════════════════════════════════════════════════

const FB = !firebaseConfig.apiKey.startsWith("DEIN") && firebaseConfig.apiKey !== "AIzaSy...";
let app, auth, db;

// ── STATE ──────────────────────────────────────────────────────────────────
let cards = [], categories = [];
let editingId = null, activeColor = null, activeCat = '';
let pendingImg = null;
let unsubCards = null, unsubCats = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ── APP INITIALISIERUNG ─────────────────────────────────────────────────────
async function initApp() {
  if (FB) {
    try {
      app  = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db   = getFirestore(app);

      // Automatischer Login-Status-Check
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          console.log("Angemeldet als:", user.uid);
          showAppUI(true);
          subscribeFirestore();
        } else {
          // Wenn nicht angemeldet, sofort anonym einloggen
          try {
            await signInAnonymously(auth);
          } catch (e) {
            console.error("Anonymer Login fehlgeschlagen:", e);
            loadLocalFallback();
          }
        }
      });
    } catch (error) {
      console.error("Firebase Fehler:", error);
      loadLocalFallback();
    }
  } else {
    loadLocalFallback();
  }
}

function loadLocalFallback() {
  showAppUI(false);
  loadLocal();
}

function showAppUI(useFirebase) {
  document.getElementById('app-screen').style.display = 'block';
  const dot = document.getElementById('fb-dot');
  if (useFirebase) {
    dot.className = 'fb-dot online';
    dot.title = 'Firebase verbunden (Anonym) ✓';
  } else {
    dot.className = 'fb-dot local';
    dot.title = 'Lokaler Modus (kein Firebase)';
    document.getElementById('setup-banner').style.display = 'flex';
  }
}

// ── FIRESTORE SYNC ─────────────────────────────────────────────────────────
function subscribeFirestore() {
  if (unsubCards) unsubCards();
  if (unsubCats)  unsubCats();

  unsubCards = onSnapshot(collection(db, 'cards'), (snap) => {
    cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderSidebar();
    renderGrid();
  });

  unsubCats = onSnapshot(collection(db, 'categories'), (snap) => {
    categories = snap.docs.map(d => d.data().name).filter(Boolean);
    renderSidebar();
    renderModalCatSelect();
  });
}

// ── LOCAL FALLBACK ─────────────────────────────────────────────────────────
function loadLocal() {
  try {
    cards = JSON.parse(localStorage.getItem('karten_cards') || '[]');
    categories = JSON.parse(localStorage.getItem('karten_cats') || '[]');
  } catch(e) {
    cards = []; categories = [];
  }
  renderSidebar();
  renderGrid();
  renderModalCatSelect();
}

function saveLocal() {
  localStorage.setItem('karten_cards', JSON.stringify(cards));
  localStorage.setItem('karten_cats', JSON.stringify(categories));
}

// ── PERSIST HELPERS ────────────────────────────────────────────────────────
async function persistCard(data) {
  if (FB && auth.currentUser) {
    await setDoc(doc(db, 'cards', data.id), data);
  } else {
    const idx = cards.findIndex(c => c.id === data.id);
    if (idx > -1) cards[idx] = data; else cards.push(data);
    saveLocal();
    renderGrid();
  }
}

async function removeCard(id) {
  if (FB && auth.currentUser) {
    await deleteDoc(doc(db, 'cards', id));
  } else {
    cards = cards.filter(c => c.id !== id);
    saveLocal();
    renderGrid();
  }
}

async function persistCategories() {
  if (FB && auth.currentUser) {
    const batch = writeBatch(db);
    categories.forEach(name => {
      const docId = btoa(unescape(encodeURIComponent(name))).replace(/=/g, '');
      batch.set(doc(db, 'categories', docId), { name });
    });
    await batch.commit();
  } else {
    saveLocal();
  }
}

// ── UI RENDERING & LOGIK ───────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible';
}
function toastHide() {
  document.getElementById('toast').className = 'toast';
}

window.addCategory = async function() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name || categories.includes(name)) return;
  categories.push(name);
  await persistCategories();
  renderSidebar();
  renderModalCatSelect();
  input.value = '';
};

window.deleteCategory = async function(name) {
  if (!confirm(`Kategorie "${name}" wirklich löschen?`)) return;
  categories = categories.filter(c => c !== name);
  if (FB && auth.currentUser) {
    const docId = btoa(unescape(encodeURIComponent(name))).replace(/=/g, '');
    await deleteDoc(doc(db, 'categories', docId));
  } else {
    saveLocal();
  }
  if (activeCat === name) activeCat = '';
  renderSidebar();
  renderGrid();
  renderModalCatSelect();
};

function renderSidebar() {
  const ul = document.getElementById('cat-list');
  const sel = document.getElementById('cat-filter');
  
  ul.innerHTML = `<li class="${activeCat === '' ? 'active' : ''}" onclick="setCat('')">
    <span>Alle</span>
    <span class="cat-count">${cards.length}</span>
  </li>`;

  categories.forEach(n => {
    const count = cards.filter(c => c.cat === n).length;
    ul.innerHTML += `<li class="${activeCat === n ? 'active' : ''}" onclick="setCat(${JSON.stringify(n)})">
      <span>${n}</span>
      <span style="display:flex; gap:.3rem; align-items:center">
        <span class="cat-count">${count}</span>
        <button class="btn danger" onclick="event.stopPropagation(); deleteCategory(${JSON.stringify(n)})" style="padding:.05rem .3rem; font-size:.65rem; border-radius:4px">✕</button>
      </span>
    </li>`;
  });

  const currentVal = sel.value;
  sel.innerHTML = '<option value="">Alle Kategorien</option>';
  categories.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n;
    if (activeCat === n) opt.selected = true;
    sel.appendChild(opt);
  });
}

window.setCat = function(name) {
  activeCat = name;
  document.getElementById('cat-filter').value = name;
  renderSidebar();
  renderGrid();
};

function getFilteredCards() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const showMissing = document.getElementById('show-missing').checked;

  return cards.filter(c => {
    if (!showMissing && c.status === 'missing') return false;
    if (activeCat && c.cat !== activeCat) return false;
    if (activeColor && c.color !== activeColor) return false;
    if (query) {
      const matchName = (c.name || '').toLowerCase().includes(query);
      const matchSet  = (c.set  || '').toLowerCase().includes(query);
      const matchNote = (c.note || '').toLowerCase().includes(query);
      if (!matchName && !matchSet && !matchNote) return false;
    }
    return true;
  });
}

function renderGrid() {
  const grid = document.getElementById('card-grid');
  const filtered = getFilteredCards();

  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-have').textContent = cards.filter(c => c.status !== 'missing').length;
  document.getElementById('stat-missing').textContent = cards.filter(c => c.status === 'missing').length;

  grid.innerHTML = '';

  const addTile = document.createElement('div');
  addTile.className = 'add-tile';
  addTile.innerHTML = '<span class="plus">＋</span><span>Karte hinzufügen</span>';
  addTile.onclick = openAddModal;
  grid.appendChild(addTile);

  filtered.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card-item' + (card.status === 'missing' ? ' missing' : '');
    el.onclick = () => openEditModal(card.id);

    const img = card.image 
      ? `<img src="${card.image}" alt="${card.name}" loading="lazy">` 
      : '<div class="no-img">🃏</div>';

    const missingBadge = card.status === 'missing' ? '<div class="missing-badge">FEHLT</div>' : '';
    const colorTag = card.color ? `<span class="tag color-${card.color}">${card.color}</span>` : '';
    const setTag = card.set ? `<span class="tag">${card.set}</span>` : '';

    el.innerHTML = `
      <div class="card-img-wrap">
        ${img}
        ${missingBadge}
      </div>
      <div class="card-info">
        <div class="card-name" title="${card.name}">${card.name || 'Unbenannt'}</div>
        <div class="card-meta">
          ${colorTag}
          ${setTag}
        </div>
      </div>
    `;
    grid.appendChild(el);
  });
}

function renderModalCatSelect() {
  const select = document.getElementById('f-cat');
  select.innerHTML = '<option value="">— keine —</option>';
  categories.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n;
    select.appendChild(opt);
  });
}

function setImgPreview(src) {
  const wrap = document.getElementById('img-preview-wrap');
  if (src) {
    wrap.innerHTML = `<img src="${src}" alt="" style="width:100%; height:100%; object-fit:cover">`;
  } else {
    wrap.innerHTML = `<div class="img-placeholder"><span>🖼</span>Klicken oder Bild hierher ziehen</div>`;
  }
}

window.openAddModal = function() {
  editingId = null;
  pendingImg = null;
  document.getElementById('modal-title').textContent = 'Karte hinzufügen';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('f-name').value = '';
  document.getElementById('f-set').value = '';
  document.getElementById('f-color').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-status').value = 'have';
  document.getElementById('img-url-input').value = '';
  renderModalCatSelect();
  document.getElementById('f-cat').value = activeCat || '';
  setImgPreview(null);
  document.getElementById('modal-overlay').classList.add('open');
};

function openEditModal(id) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  pendingImg = c.image || null;
  document.getElementById('modal-title').textContent = 'Karte bearbeiten';
  document.getElementById('btn-delete').style.display = 'inline-flex';
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-set').value = c.set || '';
  document.getElementById('f-color').value = c.color || '';
  document.getElementById('f-note').value = c.note || '';
  document.getElementById('f-status').value = c.status || 'have';
  document.getElementById('img-url-input').value = '';
  renderModalCatSelect();
  document.getElementById('f-cat').value = c.cat || '';
  setImgPreview(c.image || null);
  document.getElementById('modal-overlay').classList.add('open');
}

window.closeModal = () => {
  document.getElementById('modal-overlay').classList.remove('open');
};

window.saveCard = async function() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }

  const id = editingId || uid();
  const data = {
    id,
    name,
    set: document.getElementById('f-set').value.trim(),
    color: document.getElementById('f-color').value,
    cat: document.getElementById('f-cat').value,
    note: document.getElementById('f-note').value.trim(),
    status: document.getElementById('f-status').value,
    image: pendingImg,
    updatedAt: Date.now()
  };

  toast('Speichere...');
  await persistCard(data);
  toastHide();
  closeModal();
};

window.deleteCard = async function() {
  if (!editingId) return;
  if (!confirm('Diese Karte wirklich löschen?')) return;
  toast('Lösche...');
  await removeCard(editingId);
  toastHide();
  closeModal();
};

window.triggerImgUpload = () => document.getElementById('img-upload').click();
window.handleImgUpload = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    pendingImg = ev.target.result;
    setImgPreview(pendingImg);
  };
  reader.readAsDataURL(file);
};
window.loadFromUrl = (url) => {
  if (!url) return;
  pendingImg = url.trim();
  setImgPreview(pendingImg);
};

// Drag & Drop für Bilder
const dropZone = document.getElementById('img-preview-wrap');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--gold)'; });
dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border)');
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = 'var(--border)';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => { pendingImg = ev.target.result; setImgPreview(pendingImg); };
    reader.readAsDataURL(file);
  }
});

// START
initApp();

// Suche & Filter Listeners
document.getElementById('search-input').addEventListener('input', renderGrid);
document.getElementById('show-missing').addEventListener('change', renderGrid);
document.getElementById('cat-filter').addEventListener('change', (e) => setCat(e.target.value));

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const color = chip.dataset.color;
    if (activeColor === color) {
      activeColor = null;
      chip.classList.remove('active');
    } else {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      activeColor = color;
      chip.classList.add('active');
    }
    renderGrid();
  });
});
</script>

<style>
:root {
  --bg: #0d0d0f;
  --surface: #141418;
  --surface2: #1c1c23;
  --border: #2a2a35;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold-dim: #7a6530;
  --text: #e8e4d8;
  --text-muted: #7a7568;
  --missing-opacity: 0.15;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; min-height: 100vh; }

/* APP SCREEN */
#app-screen { display: none; }

header {
  border-bottom: 1px solid var(--border);
  padding: 1.2rem 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  background: rgba(20,20,24, .9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}
.fb-dot { width: 9px; height: 9px; border-radius: 50%; }
.fb-dot.online { background: #2ecc71; box-shadow: 0 0 7px rgba(46,204,113, 0.7); }
.fb-dot.local { background: #e67e22; box-shadow: 0 0 7px rgba(230,126,34, 0.7); }

header .stats { margin-left: auto; font-size: .85rem; color: var(--text-muted); display: flex; gap: 1.5rem; }
header .stats strong { color: var(--gold); }

.toolbar {
  padding: 1rem 2rem;
  display: flex;
  flex-wrap: wrap;
  gap: .75rem;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.toolbar input, .toolbar select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .45rem .9rem;
  border-radius: var(--radius);
  outline: none;
  font-family: inherit;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .45rem 1rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Cinzel', serif;
  font-size: .78rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { border-color: var(--gold-dim); background: #25252e; }
.btn.primary { background: linear-gradient(135deg, #7a5c1e, #a07828); color: var(--gold2); border: none; }
.btn.primary:hover { filter: brightness(1.2); }
.btn.danger { color: #e07070; border-color: #5a2020; }
.btn.danger:hover { background: #3a1a1a; }

.main { display: flex; min-height: calc(100vh - 112px); }

.sidebar { width: 230px; border-right: 1px solid var(--border); padding: 1.2rem 1rem; background: var(--surface); }
.sidebar h3 { font-family: 'Cinzel', serif; font-size: .72rem; color: var(--gold-dim); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: 1px; }

.cat-list { list-style: none; margin-bottom: 1.5rem; }
.cat-list li {
  padding: .4rem .65rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: .9rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
  transition: .2s;
}
.cat-list li:hover { background: var(--surface2); }
.cat-list li.active { background: var(--surface2); border: 1px solid var(--gold-dim); color: var(--gold2); }
.cat-count { font-size: .72rem; color: var(--text-muted); background: var(--bg); padding: .1rem .4rem; border-radius: 10px; }

.grid-area { flex: 1; padding: 1.5rem 2rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; }

.card-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.card-item:hover { transform: translateY(-4px); border-color: var(--gold-dim); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
.card-item.missing { opacity: var(--missing-opacity); filter: grayscale(100%); }
.card-item.missing:hover { opacity: 0.5; }

.card-img-wrap {
  width: 100%;
  aspect-ratio: 63/88;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  border-bottom: 1px solid var(--border);
}
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.no-img { font-size: 2rem; opacity: 0.2; }
.missing-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(192, 57, 43, 0.9);
  color: #fff;
  font-size: .6rem;
  padding: .1rem .3rem;
  border-radius: 4px;
  font-family: 'Cinzel', serif;
  font-weight: bold;
}

.card-info { padding: .5rem .65rem; }
.card-name { font-size: .83rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .1rem; }
.card-meta { display: flex; flex-wrap: wrap; gap: .3rem; }
.tag { font-size: .6rem; padding: .1rem .4rem; border-radius: 10px; border: 1px solid var(--border); color: var(--text-muted); background: var(--bg); }

.color-Weiß { border-color: #d5d8dc; color: #d5d8dc; }
.color-Blau { border-color: #2471a3; color: #5dade2; }
.color-Schwarz { border-color: #566573; color: #abb2b9; }
.color-Rot { border-color: #c0392b; color: #ec7063; }
.color-Grün { border-color: #1e8449; color: #52be80; }

.add-tile {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  aspect-ratio: 63/88;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  gap: .5rem;
  transition: .2s;
}
.add-tile:hover { border-color: var(--gold-dim); color: var(--gold2); background: var(--surface2); }
.add-tile .plus { font-size: 1.5rem; }

/* MODAL */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0, 0.85);
  backdrop-filter: blur(5px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.form-row { margin-bottom: .8rem; }
.form-row label { display: block; font-size: .65rem; color: var(--text-muted); margin-bottom: .25rem; font-family: 'Cinzel', serif; letter-spacing: 1px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: .5rem;
  border-radius: 6px;
  outline: none;
  font-family: inherit;
}
.form-row textarea { height: 60px; resize: none; }
.img-preview-wrap {
  width: 100%;
  aspect-ratio: 63/88;
  background: var(--surface2);
  border: 2px dashed var(--border);
  margin-top: .5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 6px;
  overflow: hidden;
  color: var(--text-muted);
  font-size: .8rem;
  text-align: center;
  padding: 1rem;
}

.color-chips { display: flex; gap: .4rem; }
.chip { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: .2s; }
.chip.active { border-color: var(--gold2); transform: scale(1.1); }
.chip[data-color="Weiß"] { background: #d5d8dc; }
.chip[data-color="Blau"] { background: #2471a3; }
.chip[data-color="Schwarz"] { background: #2c3e50; }
.chip[data-color="Rot"] { background: #c0392b; }
.chip[data-color="Grün"] { background: #1e8449; }

.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  color: var(--gold2);
  padding: .5rem 1.5rem;
  border-radius: 20px;
  font-size: .9rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 1000;
  border: 1px solid var(--gold-dim);
}
.toast.visible { opacity: 1; }

#setup-banner {
  display: none;
  background: #1a140a;
  border-top: 1px solid var(--gold-dim);
  padding: 1rem 2rem;
  font-size: .8rem;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 500;
  color: var(--gold2);
  gap: 1rem;
  align-items: center;
}
#setup-banner a { color: #fff; text-decoration: underline; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  header { padding: 1rem; }
  .grid-area { padding: 1rem; }
  .toolbar { padding: .75rem 1rem; }
}
</style>
</head>
<body>

<div id="app-screen">
  <header>
    <h1>⬡ KARTENSAMMLUNG</h1>
    <div id="fb-dot" class="fb-dot local"></div>
    <div class="stats">
      <span><strong id="stat-total">0</strong> Gesamt</span>
      <span><strong id="stat-have">0</strong> Im Besitz</span>
      <span><strong id="stat-missing">0</strong> Fehlend</span>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 Suchen...">
    <select id="cat-filter">
      <option value="">Alle Kategorien</option>
    </select>
    <div class="color-chips">
      <div class="chip" data-color="Weiß" title="Weiß"></div>
      <div class="chip" data-color="Blau" title="Blau"></div>
      <div class="chip" data-color="Schwarz" title="Schwarz"></div>
      <div class="chip" data-color="Rot" title="Rot"></div>
      <div class="chip" data-color="Grün" title="Grün"></div>
    </div>
    <label style="font-size:.8rem; display:flex; gap:.4rem; align-items:center; cursor:pointer; color:var(--text-muted)">
      <input type="checkbox" id="show-missing" checked> Fehlende anzeigen
    </label>
    <button class="btn primary" style="margin-left:auto" onclick="openAddModal()">＋ Karte</button>
  </div>

  <div class="main">
    <aside class="sidebar">
      <h3>Kategorien</h3>
      <ul class="cat-list" id="cat-list"></ul>
      <div style="display:flex; gap:.3rem; margin-top:1rem">
        <input type="text" id="new-cat-input" placeholder="Neu..." style="width:100%; background:var(--surface2); border:1px solid var(--border); color:#fff; padding:.3rem; border-radius:4px; font-size:.8rem">
        <button class="btn" onclick="addCategory()" style="padding:.3rem .6rem">＋</button>
      </div>
    </aside>
    <div class="grid-area">
      <div class="grid" id="card-grid"></div>
    </div>
  </div>
</div>

<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title" style="font-family:'Cinzel'; color:var(--gold2); margin-bottom:1.2rem; font-size:1.2rem">Karte bearbeiten</h2>
    
    <div class="form-row">
      <label>NAME DER KARTE</label>
      <input type="text" id="f-name" placeholder="z.B. Schwarzer Lotus">
    </div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:.8rem">
      <div class="form-row">
        <label>EDITION / SET</label>
        <input type="text" id="f-set" placeholder="z.B. Alpha">
      </div>
      <div class="form-row">
        <label>FARBE</label>
        <select id="f-color">
          <option value="">— keine —</option>
          <option>Weiß</option>
          <option>Blau</option>
          <option>Schwarz</option>
          <option>Rot</option>
          <option>Grün</option>
        </select>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:.8rem">
      <div class="form-row">
        <label>KATEGORIE</label>
        <select id="f-cat"></select>
      </div>
      <div class="form-row">
        <label>STATUS</label>
        <select id="f-status">
          <option value="have">✅ Vorhanden</option>
          <option value="missing">❌ Fehlt (Suche)</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>NOTIZEN</label>
      <textarea id="f-note" placeholder="Zustand, Wert oder Fundort..."></textarea>
    </div>

    <div class="form-row">
      <label>ABBILDUNG</label>
      <div class="img-preview-wrap" onclick="triggerImgUpload()" id="img-preview-wrap">
        <div class="img-placeholder"><span>🖼</span>Klicken oder Bild hierher ziehen</div>
      </div>
      <input type="file" id="img-upload" hidden onchange="handleImgUpload(event)" accept="image/*">
      <input type="text" id="img-url-input" placeholder="Oder Bild-URL hier einfügen..." onkeydown="if(event.key==='Enter')loadFromUrl(this.value)" style="margin-top:.5rem; font-size:.75rem">
    </div>

    <div style="display:flex; justify-content:flex-end; gap:.5rem; margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border)">
      <button class="btn danger" id="btn-delete" onclick="deleteCard()" style="margin-right:auto">Löschen</button>
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary" onclick="saveCard()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="setup-banner">
  <div style="flex:1">
    <strong>Hinweis:</strong> Firebase API-Key nicht konfiguriert. Daten werden nur lokal im Browser gespeichert.
  </div>
</div>

</body>
</html>
