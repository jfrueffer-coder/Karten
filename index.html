<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartensammlung Pro - High Visibility</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUy7K4LvGedpWv1ctM0QmTPdZ3Q_8fW44",
  authDomain: "karten-96920.firebaseapp.com",
  projectId: "karten-96920",
  storageBucket: "karten-96920.firebasestorage.app",
  messagingSenderId: "895981550262",
  appId: "1:895981550262:web:d69cc1e84ab956ca780417"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// STATE
let cards = [];
let categories = []; 
let editingId = null;
let activeColor = null;
let activeCat = ''; 
let pendingImg = null;
let collapsedParents = new Set();

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// INIT
async function initApp() {
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('fb-dot').className = 'fb-dot online';
      subscribeFirestore();
    } else {
      await signInAnonymously(auth);
    }
  });
}

function subscribeFirestore() {
  onSnapshot(collection(db, 'cards'), (snap) => {
    cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderSidebar();
    renderGrid();
  });
  onSnapshot(collection(db, 'categories'), (snap) => {
    categories = snap.docs.map(d => d.data());
    renderSidebar();
    renderModalCatSelect();
    renderParentSelect();
  });
}

// UI LOGIK KLAPPBAR
window.toggleParent = (e, name) => {
  e.stopPropagation();
  if (collapsedParents.has(name)) collapsedParents.delete(name);
  else collapsedParents.add(name);
  renderSidebar();
};

// DRAG & DROP
window.addEventListener('dragover', (e) => { e.preventDefault(); document.body.classList.add('drag-active'); });
window.addEventListener('dragleave', (e) => { if (e.relatedTarget === null) document.body.classList.remove('drag-active'); });
window.addEventListener('drop', (e) => {
  e.preventDefault();
  document.body.classList.remove('drag-active');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => { 
        openAddModal();
        pendingImg = ev.target.result; 
        setImgPreview(pendingImg); 
    };
    reader.readAsDataURL(file);
  }
});

// KATEGORIEN
window.addCategory = async function() {
  const input = document.getElementById('new-cat-input');
  const parentSel = document.getElementById('new-cat-parent');
  const name = input.value.trim();
  if (!name) return;
  const docId = btoa(unescape(encodeURIComponent(name))).replace(/=/g, '');
  await setDoc(doc(db, 'categories', docId), { name, parent: parentSel.value || null });
  input.value = '';
};

window.deleteCategory = async function(name) {
  if (!confirm(`Kategorie "${name}" löschen?`)) return;
  const docId = btoa(unescape(encodeURIComponent(name))).replace(/=/g, '');
  await deleteDoc(doc(db, 'categories', docId));
};

function renderParentSelect() {
  const sel = document.getElementById('new-cat-parent');
  sel.innerHTML = '<option value="">(Überkategorie)</option>';
  categories.filter(c => !c.parent).forEach(c => {
    sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
  });
}

function renderModalCatSelect() {
  const select = document.getElementById('f-cat');
  const currentVal = select.value;
  select.innerHTML = '<option value="">Keine Kategorie</option>';
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name;
    opt.textContent = c.parent ? `${c.parent} > ${c.name}` : c.name;
    select.appendChild(opt);
  });
  select.value = currentVal;
}

function updateStats() {
  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-have').textContent = cards.filter(c => c.status !== 'missing').length;
}

// SIDEBAR MIT OPTIMIERTER COMPLETION
function renderSidebar() {
  const ul = document.getElementById('cat-list');
  ul.innerHTML = '';
  
  const createLi = (name, label, isSub = false, isAll = false, hasChildren = false) => {
    let relevantCards = [];
    if (isAll) relevantCards = cards;
    else if (isSub) relevantCards = cards.filter(c => c.cat === name);
    else {
      const subCats = categories.filter(sc => sc.parent === name).map(sc => sc.name);
      relevantCards = cards.filter(c => c.cat === name || subCats.includes(c.cat));
    }
    const total = relevantCards.length;
    const owned = relevantCards.filter(c => c.status !== 'missing').length;
    const percent = total > 0 ? Math.round((owned / total) * 100) : 0;
    
    const li = document.createElement('li');
    li.className = (activeCat === name) ? 'active' : '';
    if(isSub) li.classList.add('sub-item');
    if(!isSub && !isAll) li.classList.add('parent-item');
    const isCollapsed = collapsedParents.has(name);

    li.onclick = () => { activeCat = name; renderSidebar(); renderGrid(); };
    li.innerHTML = `
      <div class="completion-fill" style="width: ${percent}%"></div>
      
      <div style="display:flex; align-items:center; gap:8px; flex:1; position:relative; z-index:2">
        ${hasChildren ? `<span class="toggle-icon ${isCollapsed ? '' : 'open'}" onclick="toggleParent(event, '${name}')">▶</span>` : (isSub ? '' : '<span style="width:14px"></span>')}
        <div style="display:flex; flex-direction:column; gap:0px">
          <span class="cat-label">${label}</span>
          ${total > 0 ? `<span class="completion-text">${percent}% erledigt</span>` : ''}
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px; position:relative; z-index:2">
        <span class="cat-count">${total}</span>
        ${!isAll ? `<button class="btn-del-cat" onclick="event.stopPropagation(); deleteCategory('${name}')">✕</button>` : ''}
      </div>
    `;
    return li;
  };

  ul.appendChild(createLi('', 'Alle Karten', false, true));
  const parents = categories.filter(c => !c.parent);
  parents.forEach(p => {
    const children = categories.filter(c => c.parent === p.name);
    ul.appendChild(createLi(p.name, p.name, false, false, children.length > 0));
    if (!collapsedParents.has(p.name)) {
      children.forEach(sub => {
        ul.appendChild(createLi(sub.name, sub.name, true));
      });
    }
  });
}

// GRID
function renderGrid() {
  const grid = document.getElementById('card-grid');
  const queryStr = document.getElementById('search-input').value.toLowerCase();
  const showMissing = document.getElementById('show-missing').checked;
  const filtered = cards.filter(c => {
    if (!showMissing && c.status === 'missing') return false;
    if (activeCat !== '') {
      const isParent = categories.find(cat => cat.name === activeCat && !cat.parent);
      if (isParent) {
        const subCatNames = categories.filter(cat => cat.parent === activeCat).map(cat => cat.name);
        if (c.cat !== activeCat && !subCatNames.includes(c.cat)) return false;
      } else if (c.cat !== activeCat) return false;
    }
    if (activeColor && c.color !== activeColor) return false;
    if (queryStr) {
      const inName = (c.name || '').toLowerCase().includes(queryStr);
      const inSet = (c.set || '').toLowerCase().includes(queryStr);
      if (!inName && !inSet) return false;
    }
    return true;
  });

  grid.innerHTML = ''; 
  filtered.forEach(c => {
    const hasInfo = c.name || c.color || c.set;
    const div = document.createElement('div');
    div.className = `card-item ${c.status === 'missing' ? 'missing' : ''}`;
    div.onclick = () => openEditModal(c.id);
    div.innerHTML = `
      <div class="card-img-wrap">
        ${c.image ? `<img src="${c.image}">` : '🃏'}
        ${c.status === 'missing' ? '<div class="missing-badge">FEHLT</div>' : ''}
      </div>
      <div class="card-info ${hasInfo ? 'has-content' : ''}">
        ${c.name ? `<div class="card-name">${c.name}</div>` : ''}
        <div class="card-meta">${c.color ? `<span class="tag color-${c.color}">${c.color}</span>` : ''} ${c.set ? `<span class="tag">${c.set}</span>` : ''}</div>
      </div>
    `;
    grid.appendChild(div);
  });
}

window.updateGridColumns = () => {
  const val = document.getElementById('grid-columns').value;
  const grid = document.getElementById('card-grid');
  grid.style.gridTemplateColumns = val === 'auto' ? 'repeat(auto-fill, minmax(160px, 1fr))' : `repeat(${val}, 1fr)`;
};

// MODAL
window.openAddModal = () => {
  editingId = null; pendingImg = null;
  document.getElementById('modal-title').textContent = 'Neue Karte';
  document.getElementById('btn-delete-card').style.display = 'none';
  document.getElementById('f-name').value = '';
  document.getElementById('f-set').value = '';
  document.getElementById('f-color').value = '';
  document.getElementById('f-cat').value = activeCat || '';
  document.getElementById('f-status').value = 'have';
  setImgPreview(null);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
};

window.openEditModal = (id) => {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  editingId = id; pendingImg = c.image;
  document.getElementById('modal-title').textContent = 'Karte bearbeiten';
  document.getElementById('btn-delete-card').style.display = 'block';
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-set').value = c.set || '';
  document.getElementById('f-color').value = c.color || '';
  document.getElementById('f-cat').value = c.cat || '';
  document.getElementById('f-status').value = c.status || 'have';
  setImgPreview(c.image);
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

window.closeModal = () => document.getElementById('modal-overlay').classList.remove('open');

window.saveCard = async function() {
  const id = editingId || uid();
  const data = {
    id,
    name: document.getElementById('f-name').value.trim(),
    set: document.getElementById('f-set').value.trim(),
    color: document.getElementById('f-color').value,
    cat: document.getElementById('f-cat').value,
    status: document.getElementById('f-status').value,
    image: pendingImg || null,
    updatedAt: Date.now()
  };
  await setDoc(doc(db, 'cards', id), data);
  closeModal();
};

window.addEventListener('keydown', (e) => {
  const modal = document.getElementById('modal-overlay');
  if (modal.classList.contains('open')) {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      saveCard();
    }
    if (e.key === 'Escape') closeModal();
  }
});

window.removeCard = async function() {
  if (!editingId || !confirm("Löschen?")) return;
  await deleteDoc(doc(db, 'cards', editingId));
  closeModal();
};

function setImgPreview(src) {
  const wrap = document.getElementById('img-preview-wrap');
  wrap.innerHTML = src ? `<img src="${src}" style="width:100%;height:100%;object-fit:cover">` : '🖼 Bild';
}

window.triggerUpload = () => document.getElementById('f-upload').click();
window.handleFileSelect = (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => { pendingImg = ev.target.result; setImgPreview(pendingImg); };
    reader.readAsDataURL(file);
  }
};

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const color = chip.dataset.color;
      activeColor = (activeColor === color) ? null : color;
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.color === activeColor));
      renderGrid();
    });
  });
  document.getElementById('search-input').addEventListener('input', renderGrid);
});

initApp();
</script>

<style>
:root { --bg: #0d0d0f; --surface: #141418; --surface2: #1c1c23; --border: #2a2a35; --gold: #f1d382; --gold-dim: #7a6530; --text: #e8e4d8; }
body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; margin: 0; overflow-x: hidden; }
header { padding: 1rem 2rem; display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
h1 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--gold); margin: 0; letter-spacing: 2px; }
.fb-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 15px; background: #333; }
.fb-dot.online { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
.stats-header { margin-left: auto; display: flex; gap: 1.2rem; font-size: .85rem; color: #777; }
.toolbar { padding: 1rem 2rem; display: flex; flex-wrap: wrap; gap: 1rem; background: var(--surface2); border-bottom: 1px solid var(--border); align-items: center; }
input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: .6rem; border-radius: 8px; outline: none; }
.main { display: flex; min-height: calc(100vh - 130px); }

/* SIDEBAR & COMPLETION */
.sidebar { width: 300px; padding: 1.5rem; border-right: 1px solid var(--border); background: var(--surface); overflow-y: auto; }
.cat-list { list-style: none; padding: 0; margin: 1rem 0; }
.cat-list li { 
    padding: .8rem 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
    border-radius: 8px; margin-bottom: 6px; transition: .15s; font-size: 0.95rem; border: 1px solid var(--border); 
    position: relative; overflow: hidden; background: var(--bg);
}
.cat-list li:hover { border-color: var(--gold-dim); }
.cat-list li.active { border-color: var(--gold); background: var(--surface2); }

.completion-fill { 
    position: absolute; left: 0; top: 0; bottom: 0; 
    background: rgba(241, 211, 130, 0.08); /* Sehr dezentes Gold */
    z-index: 1; transition: width 0.5s ease;
}
.completion-text { 
    font-size: 0.7rem; color: var(--gold); font-weight: 600; 
    letter-spacing: 0.5px; opacity: 0.9;
}
.cat-label { font-weight: 500; }
.parent-item .cat-label { font-family: 'Cinzel'; font-size: 0.85rem; letter-spacing: 1px; color: var(--gold); }
.sub-item { margin-left: 1rem; width: calc(100% - 1rem); }

.toggle-icon { width: 14px; display: inline-block; transition: 0.2s; font-size: 0.6rem; cursor: pointer; color: var(--gold-dim); z-index: 3; }
.toggle-icon.open { transform: rotate(90deg); color: var(--gold); }
.cat-count { font-size: .7rem; font-weight: bold; background: var(--surface2); padding: 2px 8px; border-radius: 4px; color: var(--text); border: 1px solid var(--border); }

/* GRID */
.grid-area { flex: 1; padding: 2rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
.card-item { background: #000; border: 1px solid var(--border); border-radius: 12px; aspect-ratio: 63/88; overflow: hidden; cursor: pointer; position: relative; transition: .2s; }
.card-item:hover { transform: translateY(-5px); border-color: var(--gold); }
.card-img-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; }
.card-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
.card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem .5rem .5rem; text-align: center; z-index: 2; opacity: 0; transition: 0.2s; }
.card-info.has-content { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, transparent 100%); }
.card-name { font-size: .8rem; font-weight: 600; color: #fff; text-shadow: 1px 1px 3px #000; margin-bottom: 3px; }
.tag { font-size: .6rem; padding: 1px 5px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #ddd; }
.missing-badge { position: absolute; top: 8px; right: 8px; background: #c0392b; color: #fff; font-size: .55rem; padding: 2px 5px; border-radius: 4px; z-index: 3; font-family: 'Cinzel'; }
.missing { opacity: 0.4; filter: grayscale(1); }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
.overlay.open { display: flex; }
.modal { background: var(--surface); padding: 2rem; border-radius: 15px; width: 420px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.btn { padding: .7rem 1.2rem; border-radius: 8px; cursor: pointer; font-family: 'Cinzel'; border: none; font-size: .8rem; transition: .2s; }
.btn.primary { background: var(--gold); color: #000; font-weight: bold; }
.btn-del-cat { background: none; border: none; color: #444; cursor: pointer; visibility: hidden; }
li:hover .btn-del-cat { visibility: visible; }
body.drag-active::after { content: "BILD HIER FALLEN LASSEN"; position: fixed; inset: 0; background: rgba(241, 211, 130, 0.2); border: 5px dashed var(--gold); z-index: 9999; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 2rem; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>⬡ KARTENSAMMLUNG</h1>
  <div id="fb-dot" class="fb-dot"></div>
  <div class="stats-header">Gesamt: <strong id="stat-total">0</strong> | Besitz: <strong id="stat-have">0</strong></div>
</header>

<div class="toolbar">
  <input type="text" id="search-input" placeholder="Suchen...">
  <div class="color-chips">
    <div class="chip" data-color="Weiß" style="background:#eee"></div>
    <div class="chip" data-color="Blau" style="background:#3498db"></div>
    <div class="chip" data-color="Schwarz" style="background:#333"></div>
    <div class="chip" data-color="Rot" style="background:#e74c3c"></div>
    <div class="chip" data-color="Grün" style="background:#2ecc71"></div>
  </div>
  <label style="font-size:.8rem"><input type="checkbox" id="show-missing" checked onchange="renderGrid()"> Fehlende</label>
  <select id="grid-columns" onchange="updateGridColumns()">
    <option value="auto">Auto Grid</option>
    <option value="2">2</option><option value="3">3</option><option value="4">4</option>
    <option value="5">5</option><option value="6">6</option><option value="7">7</option>
    <option value="8">8</option><option value="9">9</option><option value="10">10</option>
  </select>
  <button class="btn primary" onclick="openAddModal()">＋ NEU</button>
</div>

<div class="main">
  <aside class="sidebar">
    <ul class="cat-list" id="cat-list"></ul>
    <div style="margin-top:2rem; padding-top:1rem; border-top:1px solid var(--border)">
      <select id="new-cat-parent" style="width:100%; font-size:.75rem; margin-bottom:5px"></select>
      <div style="display:flex; gap:5px">
        <input type="text" id="new-cat-input" placeholder="Kategoriename..." style="width:100%; font-size:.8rem">
        <button class="btn primary" onclick="addCategory()" style="padding:5px">＋</button>
      </div>
    </div>
  </aside>
  <div class="grid-area">
    <div class="grid" id="card-grid"></div>
  </div>
</div>

<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title" style="color:var(--gold); font-family:'Cinzel'; text-align:center; margin-top:0">Karte</h2>
    <div id="img-preview-wrap" onclick="triggerUpload()" style="width:120px; aspect-ratio:63/88; border:2px dashed var(--border); margin:0 auto 1.5rem; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:8px; overflow:hidden"></div>
    <input type="file" id="f-upload" hidden onchange="handleFileSelect(event)" accept="image/*">
    <div style="display:flex; flex-direction:column; gap:0.8rem">
      <input type="text" id="f-name" placeholder="Name">
      <input type="text" id="f-set" placeholder="Edition">
      <div style="display:flex; gap:10px">
        <select id="f-color" style="flex:1">
          <option value="">Farbe...</option><option>Weiß</option><option>Blau</option><option>Schwarz</option><option>Rot</option><option>Grün</option>
        </select>
        <select id="f-cat" style="flex:1"></select>
      </div>
      <select id="f-status" style="width:100%"><option value="have">✅ Besitz</option><option value="missing">❌ Fehlt</option></select>
    </div>
    <div style="display:flex; gap:10px; margin-top:1.5rem">
      <button class="btn" style="background:#3a1a1a; color:#e07070; display:none" id="btn-delete-card" onclick="removeCard()">Löschen</button>
      <button class="btn primary" style="margin-left:auto" onclick="saveCard()">Speichern</button>
    </div>
  </div>
</div>

</body>
</html>
