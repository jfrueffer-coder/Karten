<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collector Ultimate – Final Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, writeBatch, query, orderBy } 
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDUy7K4LvGedpWv1ctM0QmTPdZ3Q_8fW44",
  authDomain:        "karten-96920.firebaseapp.com",
  projectId:         "karten-96920",
  messagingSenderId: "895981550262",
  appId:             "1:895981550262:web:d69cc1e84ab956ca780417"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── STATE ──────────────────────────────────────────────────────
let cards = [], categories = [];
let activeCat = '', activeColor = null, editingId = null;
let selectedCards = new Set();
let isSelecting = false, startX = 0, startY = 0;
let collapsedCats = new Set();

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

// ── AUTH ───────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('fb-dot').className = 'fb-dot online';
    subscribeData();
  } else {
    await signInAnonymously(auth).catch(console.error);
  }
});

function subscribeData() {
  onSnapshot(query(collection(db, 'cards'), orderBy('pos', 'asc')), snap => {
    cards = snap.docs.map(d => ({id:d.id, ...d.data()}));
    renderAll();
  });
  onSnapshot(collection(db, 'categories'), snap => {
    categories = snap.docs.map(d => d.data());
    renderAll();
  });
}

function renderAll() {
  renderSidebar();
  renderGrid();
  updateStats();
  renderCatDropdowns();
}

function updateStats() {
  const have = cards.filter(c => c.status !== 'missing').length;
  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-have').textContent = have;
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar() {
  const container = document.getElementById('cat-list');
  container.innerHTML = '';
  container.appendChild(createCatEl({name: '', parent: null}, 'Alle Karten'));

  const parents = categories.filter(c => !c.parent);
  parents.forEach(p => {
    const isCollapsed = collapsedCats.has(p.name);
    container.appendChild(createCatEl(p, p.name, false, true, isCollapsed));
    if (!isCollapsed) {
      categories.filter(c => c.parent === p.name).forEach(s => {
        container.appendChild(createCatEl(s, s.name, true));
      });
    }
  });
}

function createCatEl(cat, label, isSub = false, hasChildren = false, isCollapsed = false) {
  const rel = cat.name === '' ? cards : cards.filter(c => c.cat === cat.name || (categories.find(x=>x.name===c.cat)?.parent === cat.name));
  const total = rel.length, owned = rel.filter(c => c.status !== 'missing').length;
  const pct = total > 0 ? Math.round((owned / total) * 100) : 0;
  const li = document.createElement('li');
  li.className = (activeCat === cat.name ? 'active ' : '') + (isSub ? 'sub-cat' : '');
  let toggle = hasChildren ? `<span class="toggle-icon" onclick="event.stopPropagation(); toggleCatCollapse('${cat.name}')">${isCollapsed ? '▶' : '▼'}</span>` : '';
  li.onclick = () => { activeCat = cat.name; renderGrid(); renderSidebar(); };
  li.innerHTML = `<div class="per-bg" style="width:${pct}%"></div>${toggle}<span class="cat-label">${label}</span><span class="cat-pct">${pct}%</span>`;
  return li;
}

window.toggleCatCollapse = (name) => {
  collapsedCats.has(name) ? collapsedCats.delete(name) : collapsedCats.add(name);
  renderSidebar();
};

// ── GRID RENDERING ─────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  const filtered = cards.filter(c => {
    const matchesCat = !activeCat || c.cat === activeCat || (categories.find(x=>x.name===c.cat)?.parent === activeCat);
    const matchesColor = !activeColor || c.color === activeColor;
    const search = document.getElementById('search-input').value.toLowerCase();
    return matchesCat && matchesColor && (!search || c.name?.toLowerCase().includes(search));
  });

  filtered.forEach(c => {
    const div = document.createElement('div');
    div.className = `card-item ${c.status === 'missing' ? 'is-missing' : ''} ${selectedCards.has(c.id) ? 'selected' : ''}`;
    div.dataset.id = c.id;
    div.draggable = true;
    div.innerHTML = `<div class="card-img-wrap">${c.image ? `<img src="${c.image}" loading="lazy">` : '<span>🃏</span>'}</div>${c.status === 'missing' ? '<div class="badge">FEHLT</div>' : ''}<div class="card-info">${c.name || ''}</div>`;
    div.ondblclick = () => openEditModal(c);
    div.ondragstart = (e) => { e.dataTransfer.setData('card-id', c.id); div.classList.add('dragging'); };
    div.ondragend = () => div.classList.remove('dragging');
    div.ondragover = (e) => e.preventDefault();
    div.ondrop = (e) => handleSortDrop(e, c.id);
    grid.appendChild(div);
  });
}

// ── DRAG & DROP LOGIK ─────────────────────────────────────────
window.addEventListener('dragover', e => e.preventDefault());

window.addEventListener('drop', async e => {
  if (e.dataTransfer.getData('card-id')) return;
  e.preventDefault();
  
  const files = Array.from(e.dataTransfer.files);
  const html = e.dataTransfer.getData('text/html');
  let newUrls = [];

  if (files.length > 0) {
    for (let file of files) {
      if (file.type.startsWith('image/')) {
        const base64 = await new Promise(r => { const rd = new FileReader(); rd.onload = ev => r(ev.target.result); rd.readAsDataURL(file); });
        newUrls.push(base64);
      }
    }
  } else if (html) {
    const parser = new DOMParser();
    const docParsed = parser.parseFromString(html, "text/html");
    const imgs = Array.from(docParsed.querySelectorAll('img'));
    newUrls = imgs.map(img => img.src).filter(src => src);
  }

  if (newUrls.length > 0) {
    const batch = writeBatch(db);
    newUrls.forEach((url, i) => {
      const id = uid();
      batch.set(doc(db, 'cards', id), { id, image: url, status: 'have', cat: activeCat, name: '', pos: Date.now() + i });
    });
    await batch.commit();
  }
});

async function handleSortDrop(e, targetId) {
  e.preventDefault();
  const draggedId = e.dataTransfer.getData('card-id');
  if (!draggedId || draggedId === targetId) return;
  const tIdx = cards.findIndex(c => c.id === targetId);
  await updateDoc(doc(db, 'cards', draggedId), { pos: cards[tIdx].pos - 0.1 });
}

// ── SELECTION & BULK ──────────────────────────────────────────
window.addEventListener('mousedown', e => {
  if (e.target.closest('.toolbar, .sidebar, .overlay, .card-item, #bulk-bar')) return;
  isSelecting = true;
  startX = e.pageX; startY = e.pageY;
  selectedCards.clear();
  const sb = document.getElementById('selection-box');
  sb.style.display = 'block'; sb.style.width = '0px'; sb.style.height = '0px';
  updateBulkUI(); renderGrid();
});

window.addEventListener('mousemove', e => {
  if (!isSelecting) return;
  const sb = document.getElementById('selection-box');
  const x = Math.min(e.pageX, startX), y = Math.min(e.pageY, startY);
  const w = Math.abs(e.pageX - startX), h = Math.abs(e.pageY - startY);
  sb.style.left = x+'px'; sb.style.top = y+'px'; sb.style.width = w+'px'; sb.style.height = h+'px';
  const rect = sb.getBoundingClientRect();
  document.querySelectorAll('.card-item').forEach(el => {
    const r = el.getBoundingClientRect();
    const isOver = !(r.right < rect.left || r.left > rect.right || r.bottom < rect.top || r.top > rect.bottom);
    if(isOver) selectedCards.add(el.dataset.id); else selectedCards.delete(el.dataset.id);
  });
  updateBulkUI();
});

window.addEventListener('mouseup', () => { if(isSelecting) { isSelecting = false; document.getElementById('selection-box').style.display = 'none'; renderGrid(); } });

function updateBulkUI() {
  const bar = document.getElementById('bulk-bar');
  if (selectedCards.size > 0) {
    bar.style.display = 'flex';
    document.getElementById('bulk-count').textContent = `${selectedCards.size} markiert`;
  } else { bar.style.display = 'none'; }
}

window.bulkStatus = async (status) => {
  const batch = writeBatch(db);
  selectedCards.forEach(id => batch.update(doc(db, 'cards', id), { status }));
  await batch.commit();
  selectedCards.clear(); updateBulkUI(); renderGrid();
};

window.bulkDelete = async () => {
  if (!confirm('Markierte Karten löschen?')) return;
  const batch = writeBatch(db);
  selectedCards.forEach(id => batch.delete(doc(db, 'cards', id)));
  await batch.commit();
  selectedCards.clear(); updateBulkUI(); renderGrid();
};

// ── MODAL & KATEGORIEN ─────────────────────────────────────────
window.addCategory = async () => {
  const n = document.getElementById('new-cat-name').value.trim();
  const p = document.getElementById('new-cat-parent').value;
  if (n) await setDoc(doc(db, 'categories', n), { name: n, parent: p || null });
  document.getElementById('new-cat-name').value = '';
};

function renderCatDropdowns() {
  const parents = `<option value="">Keine Überkategorie</option>` + categories.filter(c=>!c.parent).map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  document.getElementById('new-cat-parent').innerHTML = parents;
  document.getElementById('f-cat').innerHTML = `<option value="">Keine</option>` + categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
}

window.openEditModal = (card) => {
  editingId = card.id;
  document.getElementById('f-name').value = card.name || '';
  document.getElementById('f-set').value = card.set || '';
  document.getElementById('f-cat').value = card.cat || '';
  document.getElementById('f-status').value = card.status || 'have';
  document.getElementById('modal-overlay').classList.add('open');
};

window.saveCard = async () => {
  await updateDoc(doc(db, 'cards', editingId), {
    name: document.getElementById('f-name').value, set: document.getElementById('f-set').value,
    cat: document.getElementById('f-cat').value, status: document.getElementById('f-status').value
  });
  document.getElementById('modal-overlay').classList.remove('open');
};

window.setCols = (c) => {
  const g = document.getElementById('card-grid');
  g.style.gridTemplateColumns = (c === 'auto') ? 'repeat(auto-fill, minmax(140px, 1fr))' : `repeat(${c}, 1fr)`;
};
</script>

<style>
:root { --bg: #0a0a0c; --surf: #121216; --border: #22222a; --gold: #f1d382; --text: #e0e0e0; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; overflow: hidden; user-select: none; }

#app { display: grid; grid-template-rows: 60px 50px 1fr; height: 100vh; }
header { background: var(--surf); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; gap: 1rem; }
.logo { font-family: 'Cinzel'; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
.fb-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
.fb-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

.toolbar { background: #1a1a20; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 2rem; gap: 1rem; }
.toolbar select, .toolbar input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 6px; border-radius: 4px; outline: none; }

.main { display: flex; overflow: hidden; }
.sidebar { width: 260px; background: var(--surf); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.cat-list { flex: 1; overflow-y: auto; padding: 10px; list-style: none; }
.cat-list li { padding: 8px 12px; margin-bottom: 4px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; }
.cat-list li.active { border-color: var(--gold); background: rgba(241, 211, 130, 0.05); }
.cat-list li.sub-cat { margin-left: 20px; font-size: 0.85rem; opacity: 0.8; }

.sidebar-footer { padding: 15px; border-top: 1px solid var(--border); background: var(--surf); }
.sidebar-footer input, .sidebar-footer select { 
    width: 100%; margin-bottom: 8px; background: #000; border: 1px solid var(--border); 
    color: white !important; padding: 8px; border-radius: 4px; font-family: inherit;
}

.toggle-icon { margin-right: 8px; font-size: 0.7rem; color: var(--gold); z-index: 10; }
.per-bg { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(241, 211, 130, 0.1); z-index: 0; }
.cat-label { flex: 1; position: relative; z-index: 1; }
.cat-pct { font-size: 0.7rem; color: var(--gold); opacity: 0.6; position: relative; z-index: 1; }

.grid-container { flex: 1; padding: 1.5rem; overflow-y: auto; position: relative; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }

.card-item { background: #000; border: 1px solid var(--border); aspect-ratio: 63/88; border-radius: 6px; overflow: hidden; position: relative; transition: 0.2s; cursor: grab; }
.card-item.selected { border-color: var(--gold); box-shadow: 0 0 12px rgba(241, 211, 130, 0.3); }
.card-item.is-missing { opacity: 0.22; filter: grayscale(1); }
.card-img-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.card-info { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, black); padding: 10px 5px 5px; font-size: 0.65rem; text-align: center; }
.badge { position: absolute; top: 5px; left: 5px; background: #ff4d4d; font-size: 0.55rem; padding: 2px 5px; border-radius: 3px; font-family: 'Cinzel'; }

#selection-box { position: absolute; background: rgba(241, 211, 130, 0.1); border: 1px solid var(--gold); pointer-events: none; display: none; z-index: 1000; }
#bulk-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #f1d382; color: black; padding: 12px 25px; border-radius: 50px; display: none; gap: 15px; align-items: center; font-weight: bold; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
.bulk-btn { border: 1px solid rgba(0,0,0,0.2); background: #000; color: #fff; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-family: 'Cinzel'; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 5000; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surf); border: 1px solid var(--border); padding: 2rem; border-radius: 12px; width: 350px; display: flex; flex-direction: column; gap: 1rem; }
.modal input, .modal select { background: var(--bg); border: 1px solid var(--border); color: white !important; padding: 10px; border-radius: 6px; }

.chip { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid #444; }
.btn-gold { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 6px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<div id="selection-box"></div>
<div id="bulk-bar"><span id="bulk-count">0 markiert</span><button class="bulk-btn" onclick="bulkStatus('have')">BESITZ</button><button class="bulk-btn" onclick="bulkStatus('missing')">FEHLT</button><button class="bulk-btn" style="background:#800; color:white" onclick="bulkDelete()">LÖSCHEN</button></div>
<div id="app">
  <header><div class="logo">⬡ COLLECTOR ULTIMATE</div><div id="fb-dot" class="fb-dot"></div><div style="margin-left:auto; font-size:0.8rem; font-family:'Cinzel'; opacity:0.7">TOTAL: <b id="stat-total">0</b> | OWNED: <b id="stat-have" style="color:#0f8">0</b></div></header>
  <div class="toolbar"><input type="text" id="search-input" placeholder="Suchen..." oninput="renderGrid()"><select onchange="setCols(this.value)"><option value="auto">Auto Grid</option><option value="2">2 Spalten</option><option value="3">3 Spalten</option><option value="4">4 Spalten</option><option value="5">5 Spalten</option><option value="6">6 Spalten</option><option value="7">7 Spalten</option><option value="8">8 Spalten</option><option value="9">9 Spalten</option><option value="10">10 Spalten</option></select>
    <div style="display:flex; gap:8px; margin-left:10px;"><div class="chip" style="background:#fff" onclick="activeColor='weiß';renderGrid()"></div><div class="chip" style="background:#25f" onclick="activeColor='blau';renderGrid()"></div><div class="chip" style="background:#f22" onclick="activeColor='rot';renderGrid()"></div><div class="chip" style="background:#2a2" onclick="activeColor='grün';renderGrid()"></div><div class="chip" style="background:#111" onclick="activeColor='schwarz';renderGrid()"></div><div class="chip" style="background:transparent; border:1px dashed #666; display:flex; align-items:center; justify-content:center; color:#666; font-size:10px;" onclick="activeColor=null;renderGrid()">✕</div></div></div>
  <div class="main">
    <aside class="sidebar">
        <ul class="cat-list" id="cat-list"></ul>
        <div class="sidebar-footer">
            <input type="text" id="new-cat-name" placeholder="Neue Kategorie Name...">
            <select id="new-cat-parent"></select>
            <button class="btn-gold" style="width:100%;" onclick="addCategory()">KATEGORIE ERSTELLEN</button>
        </div>
    </aside>
    <div class="grid-container"><div class="grid" id="card-grid"></div></div>
  </div>
</div>
<div class="overlay" id="modal-overlay"><div class="modal"><h3 style="font-family:'Cinzel'; color:var(--gold)">Karte Editieren</h3><input type="text" id="f-name" placeholder="Name"><input type="text" id="f-set" placeholder="Edition"><select id="f-cat"></select><select id="f-status"><option value="have">Im Besitz</option><option value="missing">Fehlt</option></select><button class="btn-gold" onclick="saveCard()">SPEICHERN</button><button class="btn-gold" style="background:#222; color:#fff" onclick="document.getElementById('modal-overlay').classList.remove('open')">ABBRECHEN</button></div></div>
</body>
</html>
