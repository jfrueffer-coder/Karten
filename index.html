<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartensammlung Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// FIREBASE KONFIGURATION
const firebaseConfig = {
  apiKey: "AIzaSyDUy7K4LvGedpWv1ctM0QmTPdZ3Q_8fW44",
  authDomain: "karten-96920.firebaseapp.com",
  projectId: "karten-96920",
  storageBucket: "karten-96920.firebasestorage.app",
  messagingSenderId: "895981550262",
  appId: "1:895981550262:web:d69cc1e84ab956ca780417"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// STATE MANAGEMENT
let cards = [];
let categories = [];
let editingId = null;
let activeColor = null;
let activeCat = '';
let pendingImg = null;

// Hilfsfunktion für IDs
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// INITIALISIERUNG & AUTH
async function initApp() {
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('fb-dot').className = 'fb-dot online';
      subscribeFirestore();
    } else {
      await signInAnonymously(auth);
    }
  });
}

// LIVE-DATEN AUS FIREBASE
function subscribeFirestore() {
  // Karten laden
  onSnapshot(collection(db, 'cards'), (snap) => {
    cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderSidebar();
    renderGrid();
  });
  // Kategorien laden
  onSnapshot(collection(db, 'categories'), (snap) => {
    categories = snap.docs.map(d => d.data().name).filter(Boolean);
    renderSidebar();
    renderModalCatSelect();
  });
}

// GLOBAL DRAG & DROP LOGIK
window.addEventListener('dragover', (e) => {
  e.preventDefault();
  document.body.classList.add('drag-active');
});

window.addEventListener('dragleave', (e) => {
  if (e.relatedTarget === null) document.body.classList.remove('drag-active');
});

window.addEventListener('drop', (e) => {
  e.preventDefault();
  document.body.classList.remove('drag-active');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      openAddModal();
      pendingImg = ev.target.result;
      setImgPreview(pendingImg);
    };
    reader.readAsDataURL(file);
  }
});

// KATEGORIEN VERWALTUNG
window.addCategory = async function() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name || categories.includes(name)) return;
  const docId = btoa(unescape(encodeURIComponent(name))).replace(/=/g, '');
  await setDoc(doc(db, 'categories', docId), { name });
  input.value = '';
};

window.deleteCategory = async function(name) {
  if (!confirm(`Kategorie "${name}" wirklich löschen?`)) return;
  const docId = btoa(unescape(encodeURIComponent(name))).replace(/=/g, '');
  await deleteDoc(doc(db, 'categories', docId));
};

function renderModalCatSelect() {
  const select = document.getElementById('f-cat');
  const currentVal = select.value;
  select.innerHTML = '<option value="">Keine Kategorie</option>';
  categories.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n;
    select.appendChild(opt);
  });
  select.value = currentVal;
}

// STATISTIKEN
function updateStats() {
  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-have').textContent = cards.filter(c => c.status !== 'missing').length;
}

// SIDEBAR RENDERING
function renderSidebar() {
  const ul = document.getElementById('cat-list');
  ul.innerHTML = '';
  
  const liAll = document.createElement('li');
  liAll.className = activeCat === '' ? 'active' : '';
  liAll.onclick = () => { activeCat = ''; renderSidebar(); renderGrid(); };
  liAll.innerHTML = `<span>Alle</span><span class="cat-count">${cards.length}</span>`;
  ul.appendChild(liAll);

  categories.forEach(n => {
    const count = cards.filter(c => c.cat === n).length;
    const li = document.createElement('li');
    li.className = activeCat === n ? 'active' : '';
    li.onclick = () => { activeCat = n; renderSidebar(); renderGrid(); };
    li.innerHTML = `
      <span>${n}</span>
      <div style="display:flex; align-items:center; gap:8px">
        <span class="cat-count">${count}</span>
        <button class="btn-del-cat" onclick="event.stopPropagation(); deleteCategory('${n}')">✕</button>
      </div>
    `;
    ul.appendChild(li);
  });
}

// GRID & SUCHE
function renderGrid() {
  const grid = document.getElementById('card-grid');
  const queryStr = document.getElementById('search-input').value.toLowerCase();
  const showMissing = document.getElementById('show-missing').checked;

  const filtered = cards.filter(c => {
    if (!showMissing && c.status === 'missing') return false;
    if (activeCat && c.cat !== activeCat) return false;
    if (activeColor && c.color !== activeColor) return false;
    
    if (queryStr) {
      const inName = (c.name || '').toLowerCase().includes(queryStr);
      const inNote = (c.note || '').toLowerCase().includes(queryStr);
      const inSet = (c.set || '').toLowerCase().includes(queryStr);
      if (!inName && !inNote && !inSet) return false;
    }
    return true;
  });

  grid.innerHTML = `
    <div class="add-tile" onclick="openAddModal()">
      <span class="plus">＋</span>
      <span>Neu hinzufügen</span>
    </div>
  `;

  filtered.forEach(c => {
    const div = document.createElement('div');
    div.className = `card-item ${c.status === 'missing' ? 'missing' : ''}`;
    div.onclick = () => openEditModal(c.id);
    div.innerHTML = `
      <div class="card-img-wrap">
        ${c.image ? `<img src="${c.image}">` : '<span style="font-size:2rem">🃏</span>'}
        ${c.status === 'missing' ? '<div class="missing-badge">FEHLT</div>' : ''}
      </div>
      <div class="card-info">
        <div class="card-name">${c.name || 'Unbenannte Karte'}</div>
        <div class="card-meta">
          ${c.color ? `<span class="tag color-${c.color}">${c.color}</span>` : ''}
          ${c.set ? `<span class="tag">${c.set}</span>` : ''}
        </div>
      </div>
    `;
    grid.appendChild(div);
  });
}

// MODAL LOGIK
window.openAddModal = () => {
  editingId = null;
  pendingImg = null;
  document.getElementById('modal-title').textContent = 'Neue Karte';
  document.getElementById('btn-delete-card').style.display = 'none';
  
  document.getElementById('f-name').value = '';
  document.getElementById('f-set').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-color').value = '';
  document.getElementById('f-cat').value = activeCat || '';
  document.getElementById('f-status').value = 'have';
  
  setImgPreview(null);
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-name').focus();
};

window.openEditModal = (id) => {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  pendingImg = c.image;
  
  document.getElementById('modal-title').textContent = 'Karte bearbeiten';
  document.getElementById('btn-delete-card').style.display = 'block';
  
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-set').value = c.set || '';
  document.getElementById('f-note').value = c.note || '';
  document.getElementById('f-color').value = c.color || '';
  document.getElementById('f-cat').value = c.cat || '';
  document.getElementById('f-status').value = c.status || 'have';
  
  setImgPreview(c.image);
  document.getElementById('modal-overlay').classList.add('open');
}

window.closeModal = () => document.getElementById('modal-overlay').classList.remove('open');

window.saveCard = async function() {
  const id = editingId || uid();
  const data = {
    id,
    name: document.getElementById('f-name').value.trim() || "Unbenannte Karte",
    set: document.getElementById('f-set').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    color: document.getElementById('f-color').value,
    cat: document.getElementById('f-cat').value,
    status: document.getElementById('f-status').value,
    image: pendingImg,
    updatedAt: Date.now()
  };
  
  await setDoc(doc(db, 'cards', id), data);
  closeModal();
};

// DIE REPARIERTE LÖSCHFUNKTION
window.removeCard = async function() {
  if (!editingId) return;
  if (!confirm("Karte wirklich unwiderruflich löschen?")) return;
  
  try {
    await deleteDoc(doc(db, 'cards', editingId));
    closeModal();
  } catch (error) {
    console.error("Fehler beim Löschen:", error);
    alert("Fehler beim Löschen der Karte.");
  }
};

window.handleModalKey = (e) => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
    saveCard();
  }
};

function setImgPreview(src) {
  const wrap = document.getElementById('img-preview-wrap');
  wrap.innerHTML = src ? `<img src="${src}" style="width:100%;height:100%;object-fit:cover">` : 
    '<div style="text-align:center; color:#555; font-size:.8rem">🖼 Bild hierher ziehen<br>oder klicken</div>';
}

window.triggerUpload = () => document.getElementById('f-upload').click();
window.handleFileSelect = (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      pendingImg = ev.target.result;
      setImgPreview(pendingImg);
    };
    reader.readAsDataURL(file);
  }
};

// Suche & Chips Initialisierung
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const color = chip.dataset.color;
      if (activeColor === color) {
        activeColor = null;
        chip.classList.remove('active');
      } else {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        activeColor = color;
        chip.classList.add('active');
      }
      renderGrid();
    });
  });
  document.getElementById('search-input').addEventListener('input', renderGrid);
});

initApp();
</script>

<style>
:root {
  --bg: #0d0d0f; --surface: #141418; --surface2: #1c1c23;
  --border: #2a2a35; --gold: #c9a84c; --gold-dim: #7a6530; --text: #e8e4d8;
}

* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; margin: 0; min-height: 100vh; overflow-x: hidden; }

/* Drag Overlay */
body.drag-active::after {
  content: "BILD JETZT FALLEN LASSEN";
  position: fixed; inset: 0; background: rgba(201, 168, 76, 0.2);
  border: 6px dashed var(--gold); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel'; font-size: 2rem; color: var(--gold); pointer-events: none;
}

header { padding: 1rem 2rem; display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
h1 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--gold); margin: 0; letter-spacing: 2px; }

.fb-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 15px; background: #333; }
.fb-dot.online { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

.stats-header { margin-left: auto; display: flex; gap: 1.2rem; font-size: .85rem; color: #777; }
.stats-header strong { color: var(--gold); }

.toolbar { padding: 1rem 2rem; display: flex; flex-wrap: wrap; gap: 1rem; background: var(--surface2); border-bottom: 1px solid var(--border); align-items: center; }

input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: .6rem; border-radius: 8px; outline: none; font-family: inherit; }

.main { display: flex; min-height: calc(100vh - 130px); }
.sidebar { width: 240px; padding: 1.5rem; border-right: 1px solid var(--border); background: var(--surface); }

.cat-list { list-style: none; padding: 0; margin: 1rem 0; }
.cat-list li { padding: .6rem; cursor: pointer; display: flex; justify-content: space-between; border-radius: 6px; margin-bottom: 4px; transition: .2s; }
.cat-list li:hover { background: var(--surface2); }
.cat-list li.active { color: var(--gold); background: var(--surface2); border: 1px solid var(--gold-dim); }
.cat-count { font-size: .7rem; background: var(--bg); padding: 2px 6px; border-radius: 10px; color: #777; }

.grid-area { flex: 1; padding: 2rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }

.card-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; aspect-ratio: 63/88; overflow: hidden; cursor: pointer; transition: .2s; position: relative; }
.card-item:hover { transform: translateY(-5px); border-color: var(--gold-dim); }
.card-item.missing { opacity: 0.3; filter: grayscale(100%); }

.card-img-wrap { height: 75%; background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.missing-badge { position: absolute; top: 8px; right: 8px; background: #c0392b; color: #fff; font-size: .55rem; padding: 2px 5px; border-radius: 4px; font-family: 'Cinzel'; font-weight: bold; }

.card-info { padding: .6rem; text-align: center; }
.card-name { font-size: .85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.tag { font-size: .65rem; padding: 1px 5px; border-radius: 4px; border: 1px solid #333; color: #777; margin: 0 2px; }

.color-chips { display: flex; gap: 8px; }
.chip { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: .2s; }
.chip.active { border-color: var(--gold); transform: scale(1.2); }
.chip[data-color="Weiß"] { background: #eee; }
.chip[data-color="Blau"] { background: #3498db; }
.chip[data-color="Schwarz"] { background: #333; }
.chip[data-color="Rot"] { background: #e74c3c; }
.chip[data-color="Grün"] { background: #2ecc71; }

.add-tile { border: 2px dashed #333; border-radius: 12px; aspect-ratio: 63/88; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; cursor: pointer; transition: .2s; }
.add-tile:hover { border-color: var(--gold); color: var(--gold); background: var(--surface2); }
.plus { font-size: 2.5rem; line-height: 1; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
.overlay.open { display: flex; }

.modal { background: var(--surface); padding: 2rem; border-radius: 15px; width: 420px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
.img-preview-wrap { width: 130px; aspect-ratio: 63/88; border: 2px dashed var(--border); margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; overflow: hidden; }

.btn { padding: .7rem 1.2rem; border-radius: 8px; cursor: pointer; font-family: 'Cinzel'; border: none; font-size: .8rem; transition: .2s; }
.btn.primary { background: var(--gold); color: #000; font-weight: bold; }
.btn.danger { background: #3a1a1a; color: #e07070; margin-right: auto; }

.btn-del-cat { background: none; border: none; color: #444; cursor: pointer; font-size: .8rem; }
.btn-del-cat:hover { color: #e07070; }

@media (max-width: 600px) { .sidebar { display: none; } .modal { width: 95%; } }
</style>
</head>
<body>

<header>
  <h1>⬡ KARTENSAMMLUNG</h1>
  <div id="fb-dot" class="fb-dot"></div>
  <div class="stats-header">
    <span>Gesamt: <strong id="stat-total">0</strong></span>
    <span>Besitz: <strong id="stat-have">0</strong></span>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="search-input" placeholder="Suchen..." style="flex:1">
  <div class="color-chips">
    <div class="chip" data-color="Weiß" title="Weiß"></div>
    <div class="chip" data-color="Blau" title="Blau"></div>
    <div class="chip" data-color="Schwarz" title="Schwarz"></div>
    <div class="chip" data-color="Rot" title="Rot"></div>
    <div class="chip" data-color="Grün" title="Grün"></div>
  </div>
  <label style="font-size: .8rem; display: flex; gap: 6px; align-items: center; cursor: pointer;">
    <input type="checkbox" id="show-missing" checked onchange="renderGrid()"> Fehlende
  </label>
  <button class="btn primary" onclick="openAddModal()">＋ NEU</button>
</div>

<div class="main">
  <aside class="sidebar">
    <h3 style="font-family:'Cinzel'; font-size:.75rem; color:var(--gold-dim)">KATEGORIEN</h3>
    <ul class="cat-list" id="cat-list"></ul>
    <div style="margin-top:1.5rem; display:flex; gap:6px">
      <input type="text" id="new-cat-input" placeholder="Neu..." style="width:100%; font-size:.8rem">
      <button class="btn primary" onclick="addCategory()" style="padding:4px 12px">＋</button>
    </div>
  </aside>
  <div class="grid-area"><div class="grid" id="card-grid"></div></div>
</div>

<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()" onkeydown="handleModalKey(event)">
  <div class="modal">
    <h2 id="modal-title" style="margin: 0 0 1.5rem 0; color:var(--gold); font-family:'Cinzel'; text-align:center">Karte</h2>
    <div class="img-preview-wrap" id="img-preview-wrap" onclick="triggerUpload()"></div>
    <input type="file" id="f-upload" hidden onchange="handleFileSelect(event)" accept="image/*">
    <div style="display:flex; flex-direction:column; gap:0.8rem">
      <input type="text" id="f-name" placeholder="Name">
      <input type="text" id="f-set" placeholder="Set / Edition">
      <div style="display:flex; gap:10px">
        <select id="f-color" style="flex:1">
          <option value="">Farbe...</option>
          <option>Weiß</option><option>Blau</option><option>Schwarz</option><option>Rot</option><option>Grün</option>
        </select>
        <select id="f-cat" style="flex:1"></select>
      </div>
      <select id="f-status" style="width:100%">
        <option value="have">✅ Im Besitz</option>
        <option value="missing">❌ Fehlt</option>
      </select>
      <textarea id="f-note" placeholder="Notizen..." style="height:90px; resize: none;"></textarea>
    </div>
    <div style="display:flex; gap:10px; margin-top:1.5rem; align-items:center">
      <button class="btn danger" id="btn-delete-card" onclick="removeCard()">Löschen</button>
      <button class="btn" onclick="closeModal()">Abbruch</button>
      <button class="btn primary" onclick="saveCard()">Speichern</button>
    </div>
  </div>
</div>

</body>
</html>
